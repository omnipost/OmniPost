    // android/app/build.gradle
    // ── OmniPost Android Build Configuration ──────────────────────

    apply plugin: "com.android.application"
    apply plugin: "com.facebook.react"
    apply plugin: "com.google.gms.google-services"  // Firebase

    android {
        ndkVersion rootProject.ext.ndkVersion
        buildToolsVersion rootProject.ext.buildToolsVersion
        compileSdk rootProject.ext.compileSdkVersion

        namespace "com.omnipost"
        defaultConfig {
            applicationId "com.omnipost"
            minSdkVersion rootProject.ext.minSdkVersion
            targetSdkVersion rootProject.ext.targetSdkVersion
            versionCode 1
            versionName "1.0.0"

            // ── Replace with your credentials ─────────────────────
            manifestPlaceholders = [
                facebookAppId: "REPLACE_WITH_META_APP_ID",
                facebookClientToken: "REPLACE_WITH_META_CLIENT_TOKEN",
            ]
        }

        signingConfigs {
            debug {
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
            release {
                // ── For production release ─────────────────────────
                // storeFile     file(MYAPP_UPLOAD_STORE_FILE)
                // storePassword MYAPP_UPLOAD_STORE_PASSWORD
                // keyAlias      MYAPP_UPLOAD_KEY_ALIAS
                // keyPassword   MYAPP_UPLOAD_KEY_PASSWORD
            }
        }

        buildTypes {
            debug { signingConfig signingConfigs.debug }
            release {
                signingConfig signingConfigs.debug // change to signingConfigs.release for production
                minifyEnabled  true
                proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            }
        }
    }

    dependencies {
        implementation("com.facebook.react:react-android")
        implementation("com.facebook.react:hermes-android")
        implementation platform("com.google.firebase:firebase-bom:32.7.0")
        implementation "com.google.firebase:firebase-messaging"
    }

    apply from: file("../../node_modules/@react-native-community/datetimepicker/android/build.gradle")
 