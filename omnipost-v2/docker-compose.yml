# docker-compose.yml
# Start PostgreSQL + Redis locally with one command:
# docker-compose up -d

version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    container_name: omnipost_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       omnipost_db
      POSTGRES_USER:     omnipost_user
      POSTGRES_PASSWORD: omnipost_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U omnipost_user -d omnipost_db"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    container_name: omnipost_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5

  # Optional: Redis GUI
  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: omnipost_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

  # MongoDB
  mongodb:
    image: mongo:7-alpine
    container_name: omnipost_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: omnipost_user
      MONGO_INITDB_ROOT_PASSWORD: omnipost_dev_pass
      MONGO_INITDB_DATABASE: omnipost_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
